services:
  ui:
    build: ./ui
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - api
    volumes:
      - ./ui/src:/app/src:ro
      - ./ui/index.html:/app/index.html:ro
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://api:8000}
    restart: unless-stopped

  api:
    build: ./api
    env_file: .env
    environment:
      # ── Supabase / Postgres ──────────────────────────────
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - EG_DB_BACKEND=${EG_DB_BACKEND:-postgres}
      # ── File watcher ─────────────────────────────────────
      - EG_WATCH_ROOTS=/host_watch
      - EG_POLL_INTERVAL=${EG_POLL_INTERVAL:-2}
      - EG_MAX_FILE_MB=${EG_MAX_FILE_MB:-20}
      # ── Services ─────────────────────────────────────────
      - TIKA_URL=http://tika:9998
      - QDRANT_URL=http://qdrant:6333
      - EG_MODELS_DIR=/data/models
      - EG_WHISPER_MODE=${EG_WHISPER_MODE:-stub}
      - EG_OPENCLIP_MODE=${EG_OPENCLIP_MODE:-stub}
      - EG_CAPTURE_API_KEY=${EG_CAPTURE_API_KEY:-}
      # ── CORS (add your deployed frontend URL) ────────────
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}
      # ── LLM Providers (cloud + local fallback) ───────────
      - EG_LLM_PROVIDER=${EG_LLM_PROVIDER:-auto}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EG_GEMINI_MODEL=${EG_GEMINI_MODEL:-gemini-2.5-flash}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - EG_OPENAI_MODEL=${EG_OPENAI_MODEL:-gpt-4o-mini}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - EG_GROQ_BASE_URL=${EG_GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - EG_GROQ_MODEL=${EG_GROQ_MODEL:-llama-3.3-70b-versatile}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EG_ANTHROPIC_BASE_URL=${EG_ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      - EG_ANTHROPIC_MODEL=${EG_ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      - EG_OLLAMA_URL=${EG_OLLAMA_URL:-http://host.docker.internal:11434}
      - EG_OLLAMA_MODEL=${EG_OLLAMA_MODEL:-phi3:mini}
      - EG_OLLAMA_TIMEOUT=${EG_OLLAMA_TIMEOUT:-180}
    volumes:
      - ./data:/data
      - ./api/app:/app/app:ro
      - ${EG_HOST_WATCH_PATH:-./host_watch}:/host_watch:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - qdrant
      - tika
      #- ollama (optional local LLM service)


 # ollama:
  #  image: ollama/ollama:latest
   # volumes:
    #  - ollama_data:/root/.ollama
    #ports:
     # - "127.0.0.1:11434:11434"
    #restart: unless-stopped

  tika:
    image: apache/tika:2.9.0.0-full
    expose:
      - "9998"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

volumes:
  ollama_data:
